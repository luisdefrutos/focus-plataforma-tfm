name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './app/package-lock.json'

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "mysql://dummy:dummy@localhost:3306/dummy"

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://dummy:dummy@localhost:3306/dummy"

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit Tests with Coverage
        run: npm run test:coverage

      - name: Report Coverage to GitHub Actions
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: './app/coverage/coverage-summary.json'
          json-final-path: './app/coverage/coverage-final.json'
          name: "Cobertura de Tests"

      - name: E2E Tests (Playwright)
        run: npx playwright test
        env:
          AUTH_ALLOW_MOCK: "true"
          DATABASE_URL: "mysql://dummy:dummy@localhost:3306/dummy"
          NEXTAUTH_SECRET: "dummy_secret_for_testing_purposes"
          NEXTAUTH_URL: "http://localhost:3000"
